name: Scheduled Price Update

on:
  schedule:
    - cron: '0 0 * * 0' # Se ejecuta cada domingo a las 00:00 UTC
  workflow_dispatch:      # Permite ejecutarlo manualmente desde el botón "Actions"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f data/providers.json
          if git diff --staged --quiet; then
            echo "There is no change on the price. Skipping commit."
          else
            git commit -m "chore: automated price update [skip ci]"
            git push
          fi
